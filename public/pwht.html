<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <title>NOVA PWHT Analysis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Light Theme Background Colors - Warm/Heat Theme for PWHT */
            --bg-base: #fff7ed;
            --bg-glow-1: #fed7aa; /* Orange */
            --bg-glow-2: #fca5a5; /* Red */
            --bg-glow-3: #fef08a; /* Yellow */

            /* Light Theme Glassmorphism */
            --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.7) 0%, rgba(255, 255, 255, 0.3) 100%);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-highlight: rgba(255, 255, 255, 0.9);
            --glass-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), 
                            inset 0 1px 1px rgba(255, 255, 255, 0.8), 
                            inset 0 -1px 2px rgba(0, 0, 0, 0.05);
            
            --primary: #ea580c; /* Orange 600 */
            --primary-hover: #c2410c; /* Orange 700 */
            --success: #10b981;
            --warning: #f59e0b;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            cursor: default;
        }

        body {
            min-height: 100vh;
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            opacity: 0.8;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 65vw; height: 65vw; background: var(--bg-glow-1); top: -25vh; left: -15vw; }
        .orb-2 { width: 55vw; height: 55vw; background: var(--bg-glow-2); bottom: -20vh; right: -10vw; animation-delay: -5s; }
        .orb-3 { width: 45vw; height: 45vw; background: var(--bg-glow-3); top: 25vh; left: 25vw; animation-delay: -10s; opacity: 0.6; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, 60px) scale(1.1); }
            100% { transform: translate(-30px, 40px) scale(0.9); }
        }

        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            width: 100%;
            max-width: 1500px;
            overflow: hidden;
            position: relative;
            margin-top: 1rem;
        }

        .glass-container::before {
            content: '';
            position: absolute;
            top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: glass-sheen 12s infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes glass-sheen {
            0% { left: -150%; }
            15% { left: 200%; }
            100% { left: 200%; }
        }

        .app-header {
            padding: 1.5rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 100%);
            position: relative;
            z-index: 2;
        }

        .app-header h1 {
            font-size: 1.25rem; font-weight: 800; letter-spacing: 2px;
            text-transform: uppercase; color: var(--text-main);
            text-shadow: none;
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.9);
            color: var(--text-main);
            padding: 0.6rem 1.25rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
            z-index: 2;
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 1);
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(234, 88, 12, 0.15), inset 0 1px 2px rgba(255,255,255,0.8);
            transform: translateY(-2px);
            color: var(--primary);
        }

        .form-body { padding: 3rem; position: relative; z-index: 2; }

        /* ======== PROFESSIONAL GRID LAYOUT SYSTEM ======== */
        .grid-layout { 
            display: grid; 
            grid-template-columns: repeat(3, minmax(250px, 1fr)); 
            gap: 2.5rem; 
            align-items: start;
        }

        .section-wrapper { min-width: 0; }
        
        /* Layout Mapping */
        .section-project { grid-column: 1 / 2; }
        .section-pwht { grid-column: 2 / 4; }
        .section-load { grid-column: 1 / 4; } 

        .fields-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .sub-col {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .section-pwht .fields-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
        }

        .section-load .fields-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2.5rem;
        }

        .col-title {
            color: var(--text-main); font-weight: 700; font-size: 0.9rem;
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2rem;
            display: flex; align-items: center; gap: 0.75rem; text-shadow: none;
        }
        .col-title::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, rgba(234, 88, 12, 0.2) 0%, transparent 100%);
        }

        .form-group { transition: all 0.3s ease; }
        .form-group.hidden { display: none !important; }

        .form-label {
            display: flex; align-items: center; gap: 0.75rem; font-size: 0.85rem; font-weight: 600;
            color: var(--text-main); margin-bottom: 0.6rem; text-shadow: none;
        }

        .badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 24px; height: 24px; border-radius: 6px; font-size: 0.8rem; font-weight: 800;
            color: var(--primary); background: rgba(234, 88, 12, 0.1);
            border: 1px solid rgba(234, 88, 12, 0.2);
            box-shadow: none;
        }

        .glass-input, .glass-select {
            width: 100%; padding: 0.85rem 1rem; background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.1); border-top: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 10px; font-size: 0.9rem; color: var(--text-main); transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); cursor: pointer; font-weight: 500;
        }
        .glass-select option { background: #ffffff; color: var(--text-main); }
        .glass-input:focus, .glass-select:focus {
            outline: none; border-color: rgba(234, 88, 12, 0.6); background: #ffffff;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02), 0 0 0 4px rgba(234, 88, 12, 0.15);
        }

        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .input-addon-group {
            display: flex; align-items: center; background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.1); border-top: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 10px; transition: all 0.3s ease; overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .input-addon-group:focus-within { 
            border-color: rgba(234, 88, 12, 0.6); 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02), 0 0 0 4px rgba(234, 88, 12, 0.15); 
            background: #ffffff; 
        }
        .input-addon-group .glass-input { border: none; background: transparent; box-shadow: none; border-radius: 0; }
        .addon {
            padding: 0 1rem; color: var(--text-muted); font-size: 0.8rem; font-weight: 700;
            background: rgba(0, 0, 0, 0.04); border-left: 1px solid rgba(0, 0, 0, 0.1);
            height: 100%; display: flex; align-items: center; white-space: nowrap;
        }

        .action-area {
            margin-top: 3rem; padding-top: 3rem; border-top: 1px solid rgba(0, 0, 0, 0.08);
            display: flex; flex-direction: column; align-items: center; gap: 1.5rem;
        }

        .btn-submit {
            background: linear-gradient(135deg, rgba(234, 88, 12, 0.9) 0%, rgba(194, 65, 12, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.4); border-top: 1px solid rgba(255, 255, 255, 0.8);
            color: white; padding: 1.2rem 4rem; border-radius: 12px; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(234, 88, 12, 0.3), inset 0 1px 0 rgba(255,255,255,0.4);
            letter-spacing: 1.5px; backdrop-filter: blur(15px); text-transform: uppercase;
        }
        .btn-submit:hover {
            transform: translateY(-4px); box-shadow: 0 15px 35px rgba(234, 88, 12, 0.4), inset 0 2px 2px rgba(255,255,255,0.5);
            background: linear-gradient(135deg, rgba(234, 88, 12, 1) 0%, rgba(154, 52, 18, 1) 100%);
        }

        /* =========================================
           NEW MODERN BOX MODAL STYLES
           ========================================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        
        .modern-box-wrapper {
            position: relative;
            width: 90%;
            max-width: 400px;
        }

        .modern-box-wrapper::before {
            content: "";
            position: absolute;
            inset: -4px;
            border-radius: 28px;
            background: linear-gradient(135deg, #f97316 0%, #facc15 50%, #ef4444 100%);
            background-size: 200% 200%;
            animation: gradientGlow 6s ease infinite;
            filter: blur(15px);
            opacity: 0.8;
            z-index: 0;
        }

        @keyframes gradientGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .modern-box {
            position: relative;
            background: rgba(15, 15, 15, 0.85); 
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15); 
            z-index: 1;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .modern-box h2 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .modern-box p {
            font-size: 0.95rem;
            color: #a0a0a0;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .btn-modern {
            display: inline-block;
            padding: 12px 35px;
            border-radius: 12px;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .btn-modern:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.3);
            background: #e0e0e0;
        }

        .btn-modern:active {
            transform: scale(0.98);
        }

        /* Responsive design defaults */
        @media (max-width: 1200px) {
            .grid-layout { grid-template-columns: repeat(2, 1fr); }
            .section-wrapper { grid-column: span 1 !important; }
            .section-wrapper.section-pwht, .section-wrapper.section-load { grid-column: span 2 !important; }
            .section-wrapper.section-load .fields-container { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .grid-layout { grid-template-columns: 1fr; }
            .section-wrapper.section-pwht, .section-wrapper.section-load { grid-column: span 1 !important; }
            .section-wrapper.section-pwht .fields-container, .section-wrapper.section-load .fields-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <div class="glass-container">
        <header class="app-header">
            <h1 id="main_title">NOVA PWHT ANALYSIS</h1>
            <a href="/" style="text-decoration: none;">
                <button class="btn-glass" type="button">← Dashboard</button>
            </a>
        </header>

        <form class="form-body" id="analysisForm" action="/" method="POST">
            <input type="hidden" name="active_analysis" id="active_analysis" value="pwht">

            <div class="grid-layout" id="form-grid">
                </div>

            <div class="action-area">
                <button class="btn-submit" type="button" onclick="showSolvingModal()">Solve in Ansys</button>
            </div>
        </form>
    </div>

    <div class="modal-overlay" id="solvingModal">
        <div class="modern-box-wrapper">
            <div class="modern-box">
                <p>Backend System in Development Phase</p>
                <a href="/" class="btn-modern">Got it</a>
            </div>
        </div>
    </div>

    <script>
        // PWHT Core Application Data structure
        const appData = {
            "pwht": [
                {
                    title: "1. Project",
                    fields: [
                        { name: "name", label: "System Name:", type: "text", value: "Local PWHT Analysis" },
                        { name: "component", label: "Component:", type: "select", options: ["Shell to Shell", "Shell to Head", "Shell to Shell with Tubesheet", "Shell to Cone"], value: "Shell to Shell" },
                        { name: "mat_name", label: "Material Name:", type: "text", value: "SA-516-GR-70" }
                    ]
                },
                {
                    title: "2. PWHT Design",
                    fields: [
                        { name: "shell_id", label: "Shell ID (mm):", type: "number", value: "1000" },
                        { name: "shell_thk", label: "Shell THK (mm):", type: "number", value: "25" },
                        { name: "shell_length", label: "Shell Length (mm):", type: "number", value: "2000" },
                        { name: "sb", label: "SB (mm):", type: "number", value: "50" },
                        { name: "hb", label: "HB (mm):", type: "number", value: "450" },
                        { name: "ib", label: "IB (mm):", type: "number", value: "500" }
                    ]
                },
                {
                    title: "3. Load Condition",
                    fields: [
                        { name: "amb_temp", label: "Ambient Temp. (°C):", type: "number", value: "30" },
                        { name: "heat_rate_amb", label: "Heating Rate (from Ambient) (°C/hr):", type: "number", value: "30" },
                        { name: "load_temp", label: "Loading Temp. (°C):", type: "number", value: "300" },
                        { name: "heat_rate_load", label: "Heating Rate (from Loading) (°C/hr):", type: "number", value: "30" },
                        { name: "soak_temp", label: "Soaking Temp. (°C):", type: "number", value: "600" },
                        { name: "hold_time", label: "Holding Time (hrs):", type: "number", value: "2.5" },
                        { name: "cool_rate", label: "Cooling Rate (from Soaking) (°C/hr):", type: "number", value: "30" },
                        { name: "unload_temp", label: "Unloading Temp. (°C):", type: "number", value: "300" }
                    ]
                }
            ]
        };

        // Advanced regex to parse labels and units perfectly, handling multiple parenthesis
        function parseLabelAndUnit(rawLabel) {
            // Match up to the final parenthesis for unit extraction
            const match = rawLabel.match(/(.*)\(([^)]+)\):?$/);
            if (match) {
                return { label: match[1].trim(), unit: match[2].trim() };
            }
            return { label: rawLabel.replace(':', '').trim(), unit: null };
        }

        function generateFieldHTML(f) {
            if (!f) return '';
            const dependsAttr = f.dependsOn ? `data-depends-on="${f.dependsOn}" data-show-if="${f.showIf.join(',')}"` : '';
            const parsed = parseLabelAndUnit(f.label);

            let html = `<div class="form-group" ${dependsAttr}>
                            <label class="form-label">${parsed.label}</label>`;
            
            if (f.type === 'select') {
                html += `<select class="glass-select" name="${f.name}" id="${f.name}">`;
                f.options.forEach(opt => {
                    const isSelected = opt === f.value ? 'selected' : '';
                    html += `<option value="${opt}" ${isSelected}>${opt}</option>`;
                });
                html += `</select>`;
            } 
            else {
                const isReadonly = f.readonly ? 'readonly' : '';
                
                if (parsed.unit) {
                    html += `<div class="input-addon-group">
                                <input type="${f.type}" step="any" class="glass-input" name="${f.name}" id="${f.name}" value="${f.value}" ${isReadonly}>
                                <span class="addon">${parsed.unit}</span>
                             </div>`;
                } else {
                    html += `<input type="${f.type}" step="any" class="glass-input" name="${f.name}" id="${f.name}" value="${f.value}" ${isReadonly}>`;
                }
            }
            html += `</div>`;
            return html;
        }

        function mapFields(fieldsArray) {
            return fieldsArray.map(f => f ? generateFieldHTML(f) : '').join('');
        }

        function renderForm() {
            const grid = document.getElementById('form-grid');
            grid.innerHTML = '';
            
            const sections = appData["pwht"];

            const getSectionKey = (title) => {
                if (title.includes("Project")) return "project";
                if (title.includes("PWHT Design")) return "pwht";
                if (title.includes("Load Condition")) return "load";
                return "default";
            };

            sections.forEach(sec => {
                const wrapper = document.createElement('div');
                const sectionKey = getSectionKey(sec.title);
                wrapper.className = `section-wrapper section-${sectionKey}`;
                
                const titleMatch = sec.title.match(/^(\d+)\.\s*(.*)/);
                const badgeNum = titleMatch ? titleMatch[1] : '?';
                const cleanTitle = titleMatch ? titleMatch[2] : sec.title;

                let html = `<div class="col-title"><span class="badge">${badgeNum}</span> ${cleanTitle}</div>`;
                html += `<div class="fields-container">`;

                // Sub-group handling for clean grid layouts
                if (sectionKey === 'pwht') {
                    // Split PWHT design (6 fields) into 2 logical columns (3 fields each)
                    html += `<div class="sub-col">` + mapFields(sec.fields.slice(0, 3)) + `</div>`;
                    html += `<div class="sub-col">` + mapFields(sec.fields.slice(3)) + `</div>`;
                } else if (sectionKey === 'load') {
                    // Split Load Condition (8 fields) into 4 logical columns (2 fields each) for horizontal flow
                    html += `<div class="sub-col">` + mapFields(sec.fields.slice(0, 2)) + `</div>`;
                    html += `<div class="sub-col">` + mapFields(sec.fields.slice(2, 4)) + `</div>`; 
                    html += `<div class="sub-col">` + mapFields(sec.fields.slice(4, 6)) + `</div>`; 
                    html += `<div class="sub-col">` + mapFields(sec.fields.slice(6, 8)) + `</div>`; 
                } else {
                    // Project section
                    html += mapFields(sec.fields);
                }

                html += `</div>`;

                wrapper.innerHTML = html;
                grid.appendChild(wrapper);
            });
        }

        // Action to trigger the overlay modal
        function showSolvingModal() {
            document.getElementById('solvingModal').classList.add('active');
        }

        // Initialize application on load
        renderForm();
    </script>
</body>
</html>
