<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <title>NOVA PWHT Analysis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Warm/Heat Theme for PWHT */
            --bg-base: #fff7ed;
            --bg-glow-1: #fed7aa; 
            --bg-glow-2: #fca5a5; 
            --bg-glow-3: #fef08a; 

            /* Glassmorphism Variables */
            --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.75) 0%, rgba(255, 255, 255, 0.4) 100%);
            --glass-card: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.7);
            --glass-highlight: rgba(255, 255, 255, 1);
            --glass-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), 
                            inset 0 1px 1px rgba(255, 255, 255, 0.9), 
                            inset 0 -1px 2px rgba(0, 0, 0, 0.02);
            
            --primary: #ea580c; 
            --primary-hover: #c2410c; 
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            cursor: default;
        }

        body {
            min-height: 100vh;
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            opacity: 0.8;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 65vw; height: 65vw; background: var(--bg-glow-1); top: -25vh; left: -15vw; }
        .orb-2 { width: 55vw; height: 55vw; background: var(--bg-glow-2); bottom: -20vh; right: -10vw; animation-delay: -5s; }
        .orb-3 { width: 45vw; height: 45vw; background: var(--bg-glow-3); top: 25vh; left: 25vw; animation-delay: -10s; opacity: 0.6; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, 60px) scale(1.1); }
            100% { transform: translate(-30px, 40px) scale(0.9); }
        }

        /* Centered Main Container */
        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            width: 100%;
            max-width: 1000px;
            overflow: hidden;
            position: relative;
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
        }

        .glass-container::before {
            content: '';
            position: absolute;
            top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: glass-sheen 12s infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes glass-sheen {
            0% { left: -150%; }
            15% { left: 200%; }
            100% { left: 200%; }
        }

        .app-header {
            padding: 1.25rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 100%);
            position: relative;
            z-index: 2;
        }

        .app-header h1 {
            font-size: 1.15rem; font-weight: 800; letter-spacing: 2px;
            text-transform: uppercase; color: var(--text-main);
            text-shadow: none;
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 1);
            color: var(--text-main);
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 4px 6px rgba(0,0,0,0.03);
            position: relative;
            z-index: 2;
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 1);
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(234, 88, 12, 0.15), inset 0 1px 2px rgba(255,255,255,0.9);
            transform: translateY(-2px);
            color: var(--primary);
        }

        /* Centered Form Body */
        .form-body { 
            padding: 2.5rem; 
            position: relative; 
            z-index: 2; 
            width: 100%;
            max-width: 850px; 
            margin: 0 auto;   
            display: flex;
            flex-direction: column;
            gap: 1.8rem; /* Increased gap between large section cards */
        }

        /* Inner Section Cards */
        .section-wrapper { 
            background: var(--glass-card);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.03), inset 0 1px 0 rgba(255,255,255,0.6);
            backdrop-filter: blur(20px);
        }

        .col-title {
            color: var(--text-main); font-weight: 800; font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 1.5rem; /* Increased bottom margin */
            display: flex; align-items: center; gap: 0.75rem; text-shadow: none;
        }
        .col-title::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, rgba(234, 88, 12, 0.25) 0%, transparent 100%);
        }

        .badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 20px; height: 20px; border-radius: 5px; font-size: 0.7rem; font-weight: 800;
            color: var(--primary); background: rgba(234, 88, 12, 0.12);
            border: 1px solid rgba(234, 88, 12, 0.2);
            box-shadow: none;
        }

        /* INCREASED ROW GAPS HERE */
        .fields-container {
            display: grid;
            gap: 1.5rem 1.8rem; /* Increased row gap to 1.5rem (24px) */
        }
        
        .sub-col {
            display: flex;
            flex-direction: column;
            gap: 1.5rem; /* Increased gap between stacked inputs to 1.5rem (24px) */
        }

        .project-grid { grid-template-columns: repeat(2, 1fr); }
        .pwht-grid { grid-template-columns: repeat(3, 1fr); }
        .load-grid { grid-template-columns: repeat(3, 1fr); } 

        .form-group { transition: all 0.3s ease; }
        .form-group.hidden { display: none !important; }

        .form-label {
            display: block; font-size: 0.7rem; font-weight: 700;
            color: var(--text-main); margin-bottom: 0.4rem; padding-left: 0.1rem; /* Slightly increased bottom margin */
            text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.9;
        }

        /* MICRO & COMPACT INPUT BOXES */
        .glass-input, .glass-select {
            width: 100%; 
            height: 32px; 
            padding: 0 0.6rem; 
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.12); 
            border-top: 1px solid rgba(255, 255, 255, 1);
            border-radius: 6px; 
            font-size: 0.75rem; 
            color: var(--text-main); 
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.015); 
            cursor: pointer; 
            font-weight: 600;
        }
        .glass-select option { background: #ffffff; color: var(--text-main); font-size: 0.75rem; }
        .glass-input:focus, .glass-select:focus {
            outline: none; border-color: rgba(234, 88, 12, 0.7); background: #ffffff;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02), 0 0 0 3px rgba(234, 88, 12, 0.15);
        }

        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .input-addon-group {
            display: flex; align-items: center; 
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.12); 
            border-top: 1px solid rgba(255, 255, 255, 1);
            border-radius: 6px; 
            transition: all 0.3s ease; 
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.015);
            height: 32px; 
        }
        .input-addon-group:focus-within { 
            border-color: rgba(234, 88, 12, 0.7); 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02), 0 0 0 3px rgba(234, 88, 12, 0.15); 
            background: #ffffff; 
        }
        .input-addon-group .glass-input { 
            border: none; background: transparent; box-shadow: none; border-radius: 0; height: 100%; 
        }
        .addon {
            padding: 0 0.5rem; color: var(--text-muted); font-size: 0.7rem; font-weight: 800;
            background: rgba(0, 0, 0, 0.03); border-left: 1px solid rgba(0, 0, 0, 0.1);
            height: 100%; display: flex; align-items: center; white-space: nowrap;
        }

        .action-area {
            margin-top: 1.5rem; 
            display: flex; flex-direction: column; align-items: center;
            width: 100%;
        }

        .btn-submit {
            background: linear-gradient(135deg, rgba(234, 88, 12, 0.95) 0%, rgba(194, 65, 12, 0.95) 100%);
            border: 1px solid rgba(255, 255, 255, 0.4); border-top: 1px solid rgba(255, 255, 255, 0.8);
            color: white; padding: 0.9rem 4rem; border-radius: 8px; font-weight: 800; font-size: 0.85rem;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(234, 88, 12, 0.25), inset 0 1px 0 rgba(255,255,255,0.4);
            letter-spacing: 1.5px; backdrop-filter: blur(15px); text-transform: uppercase;
        }
        .btn-submit:hover {
            transform: translateY(-2px); box-shadow: 0 15px 25px rgba(234, 88, 12, 0.35), inset 0 2px 2px rgba(255,255,255,0.5);
            background: linear-gradient(135deg, rgba(234, 88, 12, 1) 0%, rgba(154, 52, 18, 1) 100%);
        }

        /* =========================================
           MODERN BOX MODAL STYLES
           ========================================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        
        .modern-box-wrapper {
            position: relative;
            width: 90%;
            max-width: 400px;
        }

        .modern-box-wrapper::before {
            content: "";
            position: absolute;
            inset: -4px;
            border-radius: 28px;
            background: linear-gradient(135deg, #f97316 0%, #facc15 50%, #ef4444 100%);
            background-size: 200% 200%;
            animation: gradientGlow 6s ease infinite;
            filter: blur(15px);
            opacity: 0.8;
            z-index: 0;
        }

        @keyframes gradientGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .modern-box {
            position: relative;
            background: rgba(15, 15, 15, 0.85); 
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15); 
            z-index: 1;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .modern-box h2 { font-size: 2rem; font-weight: 800; color: #ffffff; margin-bottom: 8px; letter-spacing: -1px; }
        .modern-box p { font-size: 0.9rem; color: #a0a0a0; margin-bottom: 40px; font-weight: 600; }
        
        .btn-modern {
            display: inline-block; padding: 10px 30px; border-radius: 8px; background: #ffffff;
            color: #000000; text-decoration: none; font-weight: 700; font-size: 0.85rem;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2); cursor: pointer;
        }
        .btn-modern:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(255, 255, 255, 0.3); background: #e0e0e0; }
        .btn-modern:active { transform: scale(0.98); }

        /* Responsive design defaults */
        @media (max-width: 900px) {
            .project-grid { grid-template-columns: 1fr; }
            .pwht-grid { grid-template-columns: repeat(2, 1fr); }
            .load-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .pwht-grid, .load-grid { grid-template-columns: 1fr; }
            .form-body { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <div class="glass-container">
        <header class="app-header">
            <h1 id="main_title">NOVA PWHT ANALYSIS</h1>
            <a href="/" style="text-decoration: none;">
                <button class="btn-glass" type="button">← Dashboard</button>
            </a>
        </header>

        <form class="form-body" id="analysisForm" action="/" method="POST">
            <input type="hidden" name="active_analysis" id="active_analysis" value="pwht">

            <div id="form-content" style="width: 100%; display: flex; flex-direction: column; gap: 1.5rem;">
                </div>

            <div class="action-area">
                <button class="btn-submit" type="button" onclick="showSolvingModal()">Solve in Ansys</button>
            </div>
        </form>
    </div>

    <div class="modal-overlay" id="solvingModal">
        <div class="modern-box-wrapper">
            <div class="modern-box">
                <p>Backend System in Development Phase</p>
                <a href="/" class="btn-modern">Got it</a>
            </div>
        </div>
    </div>

    <script>
        // PWHT Core Application Data structure
        const appData = {
            "pwht": [
                {
                    title: "1. Project",
                    gridClass: "project-grid",
                    fields: [
                        { name: "component", label: "Component:", type: "select", options: ["Shell to Shell", "Shell to Head", "Shell to Shell with Tubesheet", "Shell to Cone"], value: "Shell to Shell" },
                        { name: "mat_name", label: "Material Name:", type: "text", value: "SA-516-GR-70" }
                    ]
                },
                {
                    title: "2. PWHT Design",
                    gridClass: "pwht-grid",
                    fields: [
                        { name: "shell_id", label: "Shell ID (mm):", type: "number", value: "1000" },
                        { name: "shell_thk", label: "Shell THK (mm):", type: "number", value: "25" },
                        { name: "shell_length", label: "Shell Length (mm):", type: "number", value: "2000" },
                        { name: "sb", label: "SB (mm):", type: "number", value: "50" },
                        { name: "hb", label: "HB (mm):", type: "number", value: "450" },
                        { name: "ib", label: "IB (mm):", type: "number", value: "500" }
                    ]
                },
                {
                    title: "3. Load Condition",
                    gridClass: "load-grid",
                    fields: [
                        { name: "amb_temp", label: "Ambient Temp. (°C):", type: "number", value: "30" },
                        { name: "heat_rate_amb", label: "Heating Rate (from Ambient) (°C/hr):", type: "number", value: "30" },
                        { name: "load_temp", label: "Loading Temp. (°C):", type: "number", value: "300" },
                        { name: "heat_rate_load", label: "Heating Rate (from Loading) (°C/hr):", type: "number", value: "30" },
                        { name: "soak_temp", label: "Soaking Temp. (°C):", type: "number", value: "600" },
                        { name: "hold_time", label: "Holding Time (hrs):", type: "number", value: "2.5" },
                        { name: "cool_rate", label: "Cooling Rate (from Soaking) (°C/hr):", type: "number", value: "30" },
                        { name: "unload_temp", label: "Unloading Temp. (°C):", type: "number", value: "300" }
                    ]
                }
            ]
        };

        function parseLabelAndUnit(rawLabel) {
            const match = rawLabel.match(/(.*)\(([^)]+)\):?$/);
            if (match) {
                return { label: match[1].trim(), unit: match[2].trim() };
            }
            return { label: rawLabel.replace(':', '').trim(), unit: null };
        }

        function generateFieldHTML(f) {
            if (!f) return '';
            const parsed = parseLabelAndUnit(f.label);

            let html = `<div class="form-group">
                            <label class="form-label">${parsed.label}</label>`;
            
            if (f.type === 'select') {
                html += `<select class="glass-select" name="${f.name}" id="${f.name}">`;
                f.options.forEach(opt => {
                    const isSelected = opt === f.value ? 'selected' : '';
                    html += `<option value="${opt}" ${isSelected}>${opt}</option>`;
                });
                html += `</select>`;
            } 
            else {
                if (parsed.unit) {
                    html += `<div class="input-addon-group">
                                <input type="${f.type}" step="any" class="glass-input" name="${f.name}" id="${f.name}" value="${f.value}">
                                <span class="addon">${parsed.unit}</span>
                             </div>`;
                } else {
                    html += `<input type="${f.type}" step="any" class="glass-input" name="${f.name}" id="${f.name}" value="${f.value}">`;
                }
            }
            html += `</div>`;
            return html;
        }

        function renderForm() {
            const contentDiv = document.getElementById('form-content');
            contentDiv.innerHTML = '';
            
            const sections = appData["pwht"];

            sections.forEach(sec => {
                const wrapper = document.createElement('div');
                wrapper.className = `section-wrapper`;
                
                const titleMatch = sec.title.match(/^(\d+)\.\s*(.*)/);
                const badgeNum = titleMatch ? titleMatch[1] : '?';
                const cleanTitle = titleMatch ? titleMatch[2] : sec.title;

                let html = `<div class="col-title"><span class="badge">${badgeNum}</span> ${cleanTitle}</div>`;
                
                // Drop inputs directly into CSS Grid handled div
                html += `<div class="fields-container ${sec.gridClass}">`;
                
                if (sec.title.includes("Load Condition")) {
                    // Split the 8 Load Condition inputs into 3 columns 
                    // Col 1: items 0, 1, 2
                    // Col 2: items 3, 4, 5
                    // Col 3: items 6, 7
                    html += `<div class="sub-col">` + sec.fields.slice(0, 3).map(f => generateFieldHTML(f)).join('') + `</div>`;
                    html += `<div class="sub-col">` + sec.fields.slice(3, 6).map(f => generateFieldHTML(f)).join('') + `</div>`;
                    html += `<div class="sub-col">` + sec.fields.slice(6, 8).map(f => generateFieldHTML(f)).join('') + `</div>`;
                } else if (sec.title.includes("PWHT Design")) {
                    // 6 fields into 3 columns -> 2 items per column
                    html += `<div class="sub-col">` + sec.fields.slice(0, 2).map(f => generateFieldHTML(f)).join('') + `</div>`;
                    html += `<div class="sub-col">` + sec.fields.slice(2, 4).map(f => generateFieldHTML(f)).join('') + `</div>`;
                    html += `<div class="sub-col">` + sec.fields.slice(4, 6).map(f => generateFieldHTML(f)).join('') + `</div>`;
                } else {
                    // Project section 
                    html += sec.fields.map(f => generateFieldHTML(f)).join('');
                }

                html += `</div>`;

                wrapper.innerHTML = html;
                contentDiv.appendChild(wrapper);
            });
        }

        function showSolvingModal() {
            document.getElementById('solvingModal').classList.add('active');
        }

        // Initialize application
        renderForm();
    </script>
</body>
</html>
