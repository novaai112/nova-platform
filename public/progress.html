<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Development</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Deep, pitch-black modern background */
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* The glowing gradient wrapper */
        .modern-box-wrapper {
            position: relative;
            width: 90%;
            max-width: 400px;
        }

        /* The animated gradient glow behind the box */
        .modern-box-wrapper::before {
            content: "";
            position: absolute;
            inset: -4px;
            border-radius: 28px;
            background: linear-gradient(135deg, #00C9FF 0%, #92FE9D 50%, #FF0080 100%);
            background-size: 200% 200%;
            animation: gradientGlow 6s ease infinite;
            filter: blur(15px);
            opacity: 0.6;
            z-index: 0;
        }

        @keyframes gradientGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* The actual Glass Box */
        .modern-box {
            position: relative;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.02);
        }

        /* Extremely short, punchy text */
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        p {
            font-size: 0.95rem;
            color: #888888;
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* Minimalist Modern Button */
        .btn-modern {
            display: inline-block;
            padding: 12px 35px;
            border-radius: 12px;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
        }

        .btn-modern:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.3);
            background: #e0e0e0;
        }

        .btn-modern:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="modern-box-wrapper">
        <div class="modern-box">
            <h1>Development</h1>
            <p>Backend System in progress.</p>
            
            <a href="https://nova-analysis.vercel.app/" class="btn-modern">Got it</a>
        </div>
    </div>

</body>
</html>
