<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <title>NOVA Stress-Strain Curve Generator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Chart.js for Professional Graphing -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            /* Light Professional Glassmorphic Theme */
            --bg-base: #f1f5f9;
            --bg-glow-1: #bae6fd; 
            --bg-glow-2: #e0e7ff; 
            --bg-glow-3: #fef08a; 

            --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0.45) 100%);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-highlight: rgba(255, 255, 255, 1);
            --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.08), 
                            inset 0 1px 1px rgba(255, 255, 255, 0.9), 
                            inset 0 -1px 2px rgba(0, 0, 0, 0.02);
            
            --primary: #2563eb; 
            --primary-hover: #1d4ed8;
            --accent: #ea580c; 
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient Background Animations */
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(150px);
            z-index: -1;
            opacity: 0.7;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 65vw; height: 65vw; background: var(--bg-glow-1); top: -10vh; left: -15vw; }
        .orb-2 { width: 55vw; height: 55vw; background: var(--bg-glow-2); bottom: -10vh; right: -10vw; animation-delay: -5s; }
        .orb-3 { width: 45vw; height: 45vw; background: var(--bg-glow-3); top: 30vh; left: 30vw; animation-delay: -10s; opacity: 0.5; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 50px) scale(1.05); }
            100% { transform: translate(-20px, 30px) scale(0.95); }
        }

        /* Main Glass Container - Fluid Height */
        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            width: 100%;
            max-width: 1400px;
            overflow: visible; /* Changed to visible to support sticky children */
            position: relative;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .app-header {
            padding: 1.5rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            background: linear-gradient(180deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 100%);
            border-radius: 24px 24px 0 0;
        }

        .app-header h1 {
            font-size: 1.25rem; font-weight: 800; letter-spacing: 2px;
            text-transform: uppercase; color: var(--text-main);
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 1);
            color: var(--text-main);
            padding: 0.6rem 1.5rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.3s;
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 4px 6px rgba(0,0,0,0.03);
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 1);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(37, 99, 235, 0.15), inset 0 1px 2px rgba(255,255,255,0.9);
        }

        /* 2-Column Layout - Perfectly Proportioned */
        .workspace {
            display: grid;
            grid-template-columns: 450px 1fr;
            align-items: start; /* Crucial for sticky right panel */
        }

        /* Left Panel - Stretches Naturally, No Scrollbar */
        .left-panel {
            padding: 2.5rem;
            border-right: 1px solid rgba(0,0,0,0.06);
            background: rgba(255,255,255,0.3);
            border-radius: 0 0 0 24px;
        }

        /* Right Panel - Sticky to stay in view */
        .right-panel {
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 2rem; /* Sticks 2rem from the top of the viewport */
            height: calc(100vh - 4rem); /* Takes full view height minus padding */
            max-height: 850px;
        }

        .chart-container {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.05);
            border-top: 1px solid rgba(255,255,255,1);
            display: flex;
            flex-direction: column;
        }

        #curveChart {
            flex-grow: 1;
            width: 100%;
        }

        /* Form Elements */
        .col-title {
            color: var(--text-main); font-weight: 800; font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 1.8rem;
            display: flex; align-items: center; gap: 0.75rem;
        }
        .col-title::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, rgba(37, 99, 235, 0.25) 0%, transparent 100%);
        }

        .form-group { margin-bottom: 1.4rem; transition: all 0.3s ease; opacity: 1; }
        
        /* Strictly Hide Elements */
        .form-group.hidden, .dynamic-group.hidden { 
            display: none !important; 
            opacity: 0;
            pointer-events: none;
            margin: 0;
            padding: 0;
        }

        .form-label {
            display: block; font-size: 0.75rem; font-weight: 700;
            color: var(--text-main); margin-bottom: 0.5rem; padding-left: 0.2rem;
            text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.9;
        }

        .glass-input, .glass-select {
            width: 100%; height: 40px; padding: 0 1rem; 
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.12); 
            border-top: 1px solid rgba(255, 255, 255, 1);
            border-radius: 8px; font-size: 0.9rem; color: var(--text-main); 
            transition: all 0.3s ease; box-shadow: inset 0 2px 4px rgba(0,0,0,0.015); 
            font-weight: 600;
        }
        .glass-input:focus, .glass-select:focus {
            outline: none; border-color: rgba(37, 99, 235, 0.7); background: #ffffff;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02), 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .input-addon-group {
            display: flex; align-items: center; 
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.12); 
            border-top: 1px solid rgba(255, 255, 255, 1);
            border-radius: 8px; overflow: hidden; height: 40px; 
        }
        .input-addon-group:focus-within { 
            border-color: rgba(37, 99, 235, 0.7); 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02), 0 0 0 3px rgba(37, 99, 235, 0.15); 
        }
        .input-addon-group .glass-input { 
            border: none; background: transparent; box-shadow: none; border-radius: 0; height: 100%; 
        }
        .addon {
            padding: 0 1rem; color: var(--text-muted); font-size: 0.8rem; font-weight: 800;
            background: rgba(0, 0, 0, 0.03); border-left: 1px solid rgba(0, 0, 0, 0.1);
            height: 100%; display: flex; align-items: center;
        }

        /* Compact, Centered Generator Button */
        .btn-submit {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.95) 0%, rgba(29, 78, 216, 0.95) 100%);
            border: 1px solid rgba(255, 255, 255, 0.4); 
            border-top: 1px solid rgba(255, 255, 255, 0.8);
            color: white; 
            padding: 0.8rem 2rem; 
            border-radius: 10px; 
            font-weight: 800; 
            font-size: 0.9rem;
            cursor: pointer; 
            transition: all 0.3s; 
            width: 100%; 
            max-width: 220px; /* Small, proportionate size */
            margin: 2.5rem auto 0 auto; /* Centered with top margin */
            display: block;
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.25); 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        .btn-submit:hover {
            transform: translateY(-2px); 
            box-shadow: 0 12px 25px rgba(37, 99, 235, 0.35);
        }

        .result-box {
            background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 1.2rem; border-radius: 10px; margin-top: 1.5rem; color: #065f46;
            font-size: 0.9rem; font-weight: 700; display: none; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        @media (max-width: 1024px) {
            .workspace { grid-template-columns: 1fr; }
            .left-panel { border-right: none; border-bottom: 1px solid rgba(0,0,0,0.06); border-radius: 0; }
            .right-panel { position: relative; height: 600px; top: 0; padding: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <div class="glass-container">
        <header class="app-header">
            <h1>NOVA Stress-Strain Generator</h1>
            <button class="btn-glass" onclick="window.location.reload()">Reset Setup</button>
        </header>

        <div class="workspace">
            
            <!-- Left Side: User Input Panel (Stretches fluidly, no scroll) -->
            <div class="left-panel">
                <div class="col-title">Base Parameters</div>
                
                <div class="form-group">
                    <label class="form-label">Curve Material Name</label>
                    <input type="text" class="glass-input" id="mat_name" value="SA-516-Gr-60">
                </div>

                <div class="form-group">
                    <label class="form-label">Temperature</label>
                    <div class="input-addon-group">
                        <input type="number" class="glass-input" id="temperature" value="200">
                        <span class="addon">°C</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Type of Stress-Strain Curve</label>
                    <select class="glass-select" id="curve_type" onchange="toggleGroups()">
                        <option value="True">True Stress-Strain Curve</option>
                        <option value="Cyclic">Cyclic Stress-Strain Curve</option>
                        <option value="Isochronous">Isochronous Stress-Strain Curve</option>
                        <option value="Tangent">Tangent Modulus Stress-Strain Curve</option>
                    </select>
                </div>

                <!-- Dynamic Group: True Stress -->
                <div id="group_true" class="dynamic-group">
                    <div class="col-title" style="margin-top: 2.5rem;">True Curve Variables</div>
                    <div class="form-group">
                        <label class="form-label">Yield Stress (σy)</label>
                        <div class="input-addon-group"><input type="number" class="glass-input" id="t_ys" value="195"><span class="addon">MPa</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Ultimate Tensile Stress (σuts)</label>
                        <div class="input-addon-group"><input type="number" class="glass-input" id="t_uts" value="415"><span class="addon">MPa</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Modulus of Elasticity (Ey)</label>
                        <div class="input-addon-group"><input type="number" class="glass-input" id="t_e" value="195"><span class="addon">GPa</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Fitting Parameter (εp)</label>
                        <div class="input-addon-group"><input type="number" class="glass-input" id="t_fp" value="0.2" step="0.01"><span class="addon">µ</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Curve Fitting Factor (m₂)</label>
                        <input type="number" class="glass-input" id="t_fcfe" value="0.6" step="0.01">
                    </div>
                </div>

                <!-- Dynamic Group: Cyclic -->
                <div id="group_cyclic" class="dynamic-group hidden">
                    <div class="col-title" style="margin-top: 2.5rem;">Cyclic Variables</div>
                    <div class="form-group">
                        <label class="form-label">Type of Cyclic Curve</label>
                        <select class="glass-select" id="c_type">
                            <option value="Amplitude">Strain Amplitude</option>
                            <option value="Range">Strain Range</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Yield Stress (σy)</label>
                        <div class="input-addon-group"><input type="number" class="glass-input" id="c_ys" value="195"><span class="addon">MPa</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Ultimate Tensile Stress (σuts)</label>
                        <div class="input-addon-group"><input type="number" class="glass-input" id="c_uts" value="415"><span class="addon">MPa</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Modulus of Elasticity (Ey)</label>
                        <div class="input-addon-group"><input type="number" class="glass-input" id="c_e" value="195"><span class="addon">GPa</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Strain Hardening Exponent</label>
                        <input type="number" class="glass-input" id="c_she" value="0.134" step="0.001">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Cyclic Strength Coeff.</label>
                        <input type="number" class="glass-input" id="c_csc" value="105.6" step="0.1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Curve Fitting Factor (m₂)</label>
                        <input type="number" class="glass-input" id="c_fcfe" value="0.6" step="0.01">
                    </div>
                </div>

                <!-- Dynamic Group: Isochronous -->
                <div id="group_iso" class="dynamic-group hidden">
                    <div class="col-title" style="margin-top: 2.5rem;">Isochronous Variables</div>
                    <div class="form-group">
                        <label class="form-label">Material Category</label>
                        <select class="glass-select" id="i_matcat">
                            <option value="Carbon steel(σuts≤379MPa)" selected>Carbon steel(σuts≤379MPa)</option>
                            <option value="Carbon steel(σuts=413MPa)">Carbon steel(σuts=413MPa)</option>
                            <option value="Carbon steel(σuts=448MPa)">Carbon steel(σuts=448MPa)</option>
                            <option value="Carbon steel(σuts=483MPa)">Carbon steel(σuts=483MPa)</option>
                            <option value="Carbon steel(σuts≥517MPa)">Carbon steel(σuts≥517MPa)</option>
                            <option value="C-0.5Mo">C–0.5Mo</option>
                            <option value="1.25Cr-0.5Mo(N&T)">1.25Cr–0.5Mo(N&T)</option>
                            <option value="1.25Cr-0.5Mo(Annealed)">1.25Cr–0.5Mo(Annealed)</option>
                            <option value="2.25Cr-1Mo(N&T)">2.25Cr–1Mo(N&T)</option>
                            <option value="2.25Cr-1Mo(Annealed)">2.25Cr–1Mo(Annealed)</option>
                            <option value="2.25Cr-1Mo(Q&T)">2.25Cr–1Mo(Q&T)</option>
                            <option value="2.25Cr-1Mo-V">2.25Cr–1Mo-V</option>
                            <option value="5Cr-0.5Mo">5Cr–0.5Mo</option>
                            <option value="9Cr-1Mo">9Cr–1Mo</option>
                            <option value="9Cr-1Mo-V">9Cr–1Mo–V</option>
                            <option value="12Cr">12Cr</option>
                            <option value="Types 304 and 304H">Types 304 and 304H</option>
                            <option value="Types 316 and 316H">Types 316 and 316H</option>
                            <option value="Type 321">Type 321</option>
                            <option value="Type 321H">Type 321H</option>
                            <option value="Type 347">Type 347</option>
                            <option value="Type 347H">Type 347H</option>
                            <option value="Alloy 800">Alloy 800</option>
                            <option value="Alloy 800H">Alloy 800H</option>
                            <option value="Alloy 800HT">Alloy 800HT</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Yield Stress (σy)</label>
                        <div class="input-addon-group"><input type="number" class="glass-input" id="i_ys" value="195"><span class="addon">MPa</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Ultimate Tensile Stress (σuts)</label>
                        <div class="input-addon-group"><input type="number" class="glass-input" id="i_uts" value="415"><span class="addon">MPa</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Modulus of Elasticity (Ey)</label>
                        <div class="input-addon-group"><input type="number" class="glass-input" id="i_e" value="195"><span class="addon">GPa</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">End Point (%)</label>
                        <div class="input-addon-group"><input type="number" class="glass-input" id="i_ep" value="2"><span class="addon">%</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Fitting Parameter (εp)</label>
                        <div class="input-addon-group"><input type="number" class="glass-input" id="i_fp" value="0.2" step="0.01"><span class="addon">µ</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Factor of Curve Fitting Exponent (m₂)</label>
                        <input type="number" class="glass-input" id="i_fcfe" value="0.6" step="0.01">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Creep Strain Rate (Δ_Ω^sr)</label>
                        <input type="number" class="glass-input" id="i_csr" value="-0.5" step="0.1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Creep Ductility (Δ_Ω^cd)</label>
                        <input type="number" class="glass-input" id="i_cd" value="0" step="0.1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Time (Hrs)</label>
                        <div class="input-addon-group"><input type="number" class="glass-input" id="i_time" value="100"><span class="addon">Hrs</span></div>
                    </div>
                </div>

                <!-- Dynamic Group: Tangent Modulus -->
                <div id="group_tangent" class="dynamic-group hidden">
                    <div class="col-title" style="margin-top: 2.5rem;">Tangent Variables</div>
                    <div class="form-group">
                        <label class="form-label">Yield Stress (σy)</label>
                        <div class="input-addon-group"><input type="number" class="glass-input" id="tm_ys" value="195"><span class="addon">MPa</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Ultimate Tensile Stress (σuts)</label>
                        <div class="input-addon-group"><input type="number" class="glass-input" id="tm_uts" value="415"><span class="addon">MPa</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Modulus of Elasticity (Ey)</label>
                        <div class="input-addon-group"><input type="number" class="glass-input" id="tm_e" value="195"><span class="addon">GPa</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Fitting Parameter (εp)</label>
                        <div class="input-addon-group"><input type="number" class="glass-input" id="tm_fp" value="0.2" step="0.01"><span class="addon">µ</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Curve Fitting Factor</label>
                        <input type="number" class="glass-input" id="tm_fcfe" value="0.6" step="0.01">
                    </div>
                </div>

                <!-- Compact, Centered Generate Button -->
                <button class="btn-submit" onclick="generateCurve()">Generate Curve</button>
                <div id="resultBox" class="result-box"></div>
            </div>

            <!-- Right Side: Professional Sticky Chart Area -->
            <div class="right-panel">
                <div class="chart-container">
                    <canvas id="curveChart"></canvas>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Store Chart Instance
        let myChart = null;

        // Strict Toggle Logic: Hide non-selected completely
        function toggleGroups() {
            document.querySelectorAll('.dynamic-group').forEach(el => {
                el.classList.add('hidden');
            });
            
            const type = document.getElementById('curve_type').value;
            if (type === 'True') document.getElementById('group_true').classList.remove('hidden');
            if (type === 'Cyclic') document.getElementById('group_cyclic').classList.remove('hidden');
            if (type === 'Isochronous') document.getElementById('group_iso').classList.remove('hidden');
            if (type === 'Tangent') document.getElementById('group_tangent').classList.remove('hidden');
            
            document.getElementById('resultBox').style.display = 'none';
        }

        // Run on mount
        window.addEventListener('DOMContentLoaded', () => {
            toggleGroups();
            renderChart([], [], 'Stress-Strain Curve (Awaiting Generation)');
        });

        // Isochronous Material Parameters Lookup
        function getOmegaParameters(material) {
            let p = { A0:0.0, A1:0.0, A2:0.0, A3:0.0, A4:0.0, B0:0.0, B1:0.0, B2:0.0, B3:0.0, B4:0.0 };
            const mat = material.replace("&amp;", "&").trim();

            if (mat.includes("379") && mat.includes("Carbon")) {
                p = {A0: -16.0, A1: 20410.67, A2: -388.827, A3: -544.7574, A4: -254.3703, B0: -1.0, B1: 1490.383, B2: 680.4895, B3: -543.968, B4: 97.21306};
            } else if (mat.includes("413") && mat.includes("Carbon")) {
                p = {A0: -16.0, A1: 20446.47, A2: -416.6975, A3: -541.5552, A4: -234.6082, B0: -1.0, B1: 1600.815, B2: 511.5982, B3: -447.6203, B4: 79.94735};
            } else if (mat.includes("448") && mat.includes("Carbon")) {
                p = {A0: -16.0, A1: 20483.34, A2: -446.7459, A3: -536.9449, A4: -215.1184, B0: -1.0, B1: 1712.316, B2: 340.4734, B3: -349.8646, B4: 62.40938};
            } else if (mat.includes("483") && mat.includes("Carbon")) {

        // Logic Processor for Chart Data Generation
        function generateCurve() {
            const curveType = document.getElementById('curve_type').value;
            const tempVal = parseFloat(document.getElementById('temperature').value);
            const materialName = document.getElementById('mat_name').value;

            let stress = [];
            let p_strain = [];
            const num = 500; // Increased resolution for smoother curve

            if (curveType === "Tangent") {
                const ys = parseFloat(document.getElementById('tm_ys').value);
                const elast = parseFloat(document.getElementById('tm_e').value) * 1000.0;
                const uts = parseFloat(document.getElementById('tm_uts').value);
                const fitt = parseFloat(document.getElementById('tm_fp').value);
                const fact = parseFloat(document.getElementById('tm_fcfe').value);

                let R = ys / uts;
                let eys = 0.002;
                let K = 1.5 * Math.pow(R, 1.5) - 0.5 * Math.pow(R, 2.5) - Math.pow(R, 3.5);
                let a = Math.log(R) + (fitt - eys);
                let b = Math.log(Math.log(1 + fitt) / Math.log(1 + eys));
                if (b === 0) b = 1e-6;
                let m1 = a / b;
                let m2 = fact * (1 - R);

                let A1 = ys * (1 + eys) / Math.pow(Math.log(1 + eys), m1);
                let A2 = uts;
                if (m2 > 0) A2 = uts * Math.exp(m2) / Math.pow(m2, m2);

                let truestress = ys;
                let H1 = K * (uts - ys);
                let H2 = 2 * (truestress - (ys + K * (uts - ys)));
                let H = H1 !== 0 ? H2 / H1 : 0;

                let d1 = Math.pow(truestress, (1/m1)-1) / (2 * m1 * Math.pow(A1, 1/m1));
                let d2 = ((Math.pow(truestress, 1/m1) * (2/(K*(uts-ys))) * (1 - Math.pow(Math.tanh(H), 2))) + ((Math.pow(truestress, (1/m1)-1) * Math.tanh(H)) / m1)) / (-2 * Math.pow(A1, 1/m1));
                let d3 = Math.pow(truestress, (1/m2)-1) / (2 * m2 * Math.pow(A2, 1/m2));
                let d4 = ((Math.pow(truestress, 1/m2) * (2/(K*(uts-ys))) * (1 - Math.pow(Math.tanh(H), 2))) + ((Math.pow(truestress, (1/m2)-1) * Math.tanh(H)) / m2)) / (2 * Math.pow(A2, 1/m2));

                let tanmod = Math.abs(1 / ((1/elast) + d1 + d2 + d3 + d4));

                stress = [0, ys, uts];
                p_strain = [0, 0, (uts - ys) / tanmod]; 
                
                const rb = document.getElementById('resultBox');
                rb.style.display = 'block';
                rb.innerHTML = `Calculated Tangent Modulus: ${tanmod.toFixed(2)} MPa<br>Yield Stress: ${ys} MPa`;

            } else {
                let ys, elast, uts, fitt, fact, R, m2, true_uts;
                let raw_stress = [];
                let raw_pstrain = [];

                if (curveType === "True") {
                    ys = parseFloat(document.getElementById('t_ys').value);
                    elast = parseFloat(document.getElementById('t_e').value) * 1000.0;
                    uts = parseFloat(document.getElementById('t_uts').value);
                    fitt = parseFloat(document.getElementById('t_fp').value);
                    fact = parseFloat(document.getElementById('t_fcfe').value);

                    R = ys / uts;
                    let eys = 0.002;
                    let K = 1.5 * Math.pow(R, 1.5) - 0.5 * Math.pow(R, 2.5) - Math.pow(R, 3.5);
                    let H1 = K * (uts - ys);
                    let a = Math.log(R) + (fitt - eys);
                    let b = Math.log(Math.log(1 + fitt) / Math.log(1 + eys));
                    if (b === 0) b = 1e-6;
                    let m1 = a / b;
                    m2 = fact * (1 - R);

                    let A1_param = ys * (1 + eys) / Math.pow(Math.log(1 + eys), m1);
                    let A2_param = uts;
                    if(m2 > 0) A2_param = uts * Math.exp(m2) / Math.pow(m2, m2);
                    true_uts = uts * Math.exp(m2);

                    for (let i = 0; i <= num; i++) {
                        let pts = ys + (i/num) * (true_uts - ys);
                        let H2 = 2 * (pts - (ys + K * (uts - ys)));
                        let H = H1 !== 0 ? H2 / H1 : 0;
                        let e3 = Math.max(0, pts / A2_param);
                        let e2 = m2 !== 0 ? Math.pow(e3, 1 / m2) : 0;
                        let e4 = Math.max(0, pts / A1_param);
                        let e1 = m1 !== 0 ? Math.pow(e4, 1 / m1) : 0;
                        
                        let y1 = e1 * 0.5 * (1 - Math.tanh(H));
                        let y2 = e2 * 0.5 * (1 + Math.tanh(H));
                        let et = (pts / elast) + y1 + y2;
                        let ps = Math.max(0, et - (pts / elast));
                        
                        raw_stress.push(pts);
                        raw_pstrain.push(ps);
                    }
                } 
                else if (curveType === "Cyclic") {
                    ys = parseFloat(document.getElementById('c_ys').value);
                    elast = parseFloat(document.getElementById('c_e').value) * 1000.0;
                    uts = parseFloat(document.getElementById('c_uts').value);
                    let she = parseFloat(document.getElementById('c_she').value);
                    let csc = parseFloat(document.getElementById('c_csc').value);
                    fact = parseFloat(document.getElementById('c_fcfe').value);
                    let cType = document.getElementById('c_type').value;

                    R = ys / uts;
                    m2 = fact * (1 - R);
                    true_uts = uts * Math.exp(m2);

                    for (let i = 0; i <= num; i++) {
                        let pts = ys + (i/num) * (true_uts - ys);
                        let ps = 0.0;
                        if (cType === "Amplitude") {
                            let eta = (pts/elast) + Math.pow(pts/csc, 1/she);
                            ps = Math.max(0, eta - (pts/elast));
                        } else {
                            let er = (pts/elast) + 2 * Math.pow(pts/(2*csc), 1/she);
                            ps = Math.max(0, er - (pts/elast));
                        }
                        raw_stress.push(pts);
                        raw_pstrain.push(ps);
                    }
                }
                else if (curveType === "Isochronous") {
                    ys = parseFloat(document.getElementById('i_ys').value);
                    elast = parseFloat(document.getElementById('i_e').value) * 1000.0;
                    uts = parseFloat(document.getElementById('i_uts').value);
                    let ep = parseFloat(document.getElementById('i_ep').value);
                    fitt = parseFloat(document.getElementById('i_fp').value);
                    fact = parseFloat(document.getElementById('i_fcfe').value);
                    let csr = parseFloat(document.getElementById('i_csr').value);
                    let cduc = parseFloat(document.getElementById('i_cd').value);
                    let time = parseFloat(document.getElementById('i_time').value);
                    let matcat = document.getElementById('i_matcat').value;

                    R = ys / uts;
                    m2 = fact * (1 - R);
                    let eys = 0.002;
                    true_uts = uts * Math.exp(m2);
                    let strain_limit = ep / 100.0;

                    let o = getOmegaParameters(matcat);
                    let K = 1.5 * Math.pow(R, 1.5) - 0.5 * Math.pow(R, 2.5) - Math.pow(R, 3.5);
                    let H1 = K * (uts - ys);
                    let a = Math.log(R) + (fitt - eys);
                    let b = Math.log(Math.log(1 + fitt) / Math.log(1 + eys));
                    if (b === 0) b = 1e-6;
                    let m1 = a / b;

                    let A1_param = ys * (1 + eys) / Math.pow(Math.log(1 + eys), m1);
                    let A2_param = uts;
                    if(m2 > 0) A2_param = uts * Math.exp(m2) / Math.pow(m2, m2);

                    for (let i = 0; i <= num; i++) {
                        let pts = ys + (i/num) * (true_uts - ys);
                        if(pts <= 0) pts = 1e-6;
                        let H2 = 2 * (pts - (ys + K * (uts - ys)));
                        
                        let sl = Math.log10(pts);
                        let omega_p2 = (o.B1 + o.B2*sl + o.B3*sl*sl + o.B4*sl*sl*sl) / (273 + tempVal);
                        let omega = Math.pow(10, o.B0 + cduc + omega_p2);
                        
                        let eco_p2 = (o.A1 + o.A2*sl + o.A3*sl*sl + o.A4*sl*sl*sl) / (273 + tempVal);
                        let eco = Math.pow(10, -(o.A0 + csr + eco_p2));
                        
                        let term = 1 - (eco * omega * time);
                        if (term <= 1e-9) break;
                        let ec = (-Math.log(term)) / omega;

                        let H = H1 !== 0 ? H2 / H1 : 0;
                        let e3 = Math.max(0, pts / A2_param);
                        let e2 = m2 !== 0 ? Math.pow(e3, 1 / m2) : 0;
                        let e4 = Math.max(0, pts / A1_param);
                        let e1 = m1 !== 0 ? Math.pow(e4, 1 / m1) : 0;
                        
                        let y1 = e1 * 0.5 * (1 - Math.tanh(H));
                        let y2 = e2 * 0.5 * (1 + Math.tanh(H));
                        let et = (pts / elast) + y1 + y2 + ec;

                        if (et >= strain_limit) {
                            raw_stress.push(pts);
                            raw_pstrain.push(Math.max(0, et - (pts/elast)));
                            break;
                        }

                        raw_stress.push(pts);
                        raw_pstrain.push(Math.max(0, et - (pts/elast)));
                    }
                }

                // Filtering Monotonic Data ensuring strict ascent
                stress.push(ys);
                p_strain.push(0.0);
                for (let i=0; i<raw_stress.length; i++) {
                    let s = raw_stress[i];
                    let ps = raw_pstrain[i];
                    if (s <= ys) continue;
                    let last_ps = p_strain[p_strain.length - 1];
                    let last_s = stress[stress.length - 1];

                    if (ps > last_ps) {
                        stress.push(s);
                        p_strain.push(ps);
                    } else if (s > last_s && ps <= last_ps) {
                        p_strain.push(last_ps + 1.0e-7);
                        stress.push(s);
                    }
                }

                // Append Smooth Plateau endpoint
                let final_target = 0.0;
                if (curveType === "Isochronous") {
                    final_target = p_strain[p_strain.length - 1] || 0.0;
                } else {
                    if (p_strain.length >= 2) {
                        final_target = p_strain[p_strain.length - 1] + (p_strain[p_strain.length - 1] - p_strain[p_strain.length - 2]);
                    } else if (p_strain.length === 1) {
                        final_target = p_strain[p_strain.length - 1] * 1.05;
                    }
                }
                if (final_target > p_strain[p_strain.length - 1]) {
                    stress.push(stress[stress.length - 1]);
                    p_strain.push(final_target);
                }
            }

            renderChart(p_strain, stress, `${curveType} Stress-Strain Curve for ${materialName} at ${tempVal}°C`, curveType === "Tangent");
        }

        // Render Professional Enhanced Chart
        function renderChart(xData, yData, title, isTangent = false) {
            const canvas = document.getElementById('curveChart');
            const ctx = canvas.getContext('2d');
            
            if (myChart) myChart.destroy();

            // Create beautiful gradient fill
            let gradient = ctx.createLinearGradient(0, 0, 0, canvas.parentElement.clientHeight || 400);
            gradient.addColorStop(0, 'rgba(37, 99, 235, 0.4)');
            gradient.addColorStop(1, 'rgba(37, 99, 235, 0.0)');

            // Highlight special points (Yield and UTS)
            let pointColors = yData.map((y, i) => {
                if (y === Math.max(...yData) || i === 1) return '#ea580c';
                return 'transparent';
            });
            let pointRadii = yData.map((y, i) => {
                if (y === Math.max(...yData) || i === 1) return 5;
                return 0;
            });

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: xData,
                    datasets: [{
                        label: 'Stress (MPa)',
                        data: yData,
                        borderColor: '#2563eb',
                        backgroundColor: gradient,
                        borderWidth: 3,
                        pointBackgroundColor: pointColors,
                        pointBorderColor: pointColors,
                        pointRadius: pointRadii,
                        pointHoverRadius: 7,
                        fill: true,
                        tension: isTangent ? 0 : 0.4 // Smooth bezier curve unless Tangent
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        title: {
                            display: true,
                            text: title,
                            font: { family: 'Plus Jakarta Sans', size: 16, weight: 'bold' },
                            color: '#0f172a',
                            padding: { bottom: 25 }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleFont: { family: 'Plus Jakarta Sans', size: 13 },
                            bodyFont: { family: 'Plus Jakarta Sans', size: 14, weight: 'bold' },
                            padding: 12,
                            cornerRadius: 8,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    return `Stress: ${context.parsed.y.toFixed(2)} MPa`;
                                },
                                title: function(context) {
                                    return `Strain: ${Number(context[0].label).toExponential(4)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'linear',
                            title: { display: true, text: 'Plastic Strain (mm/mm)', font: { family: 'Plus Jakarta Sans', size: 13, weight: '700' }, color: '#64748b' },
                            grid: { color: 'rgba(0,0,0,0.04)', borderDash: [5, 5] },
                            ticks: { color: '#64748b', font: { family: 'Plus Jakarta Sans', size: 11 } }
                        },
                        y: {
                            title: { display: true, text: 'Stress (MPa)', font: { family: 'Plus Jakarta Sans', size: 13, weight: '700' }, color: '#64748b' },
                            grid: { color: 'rgba(0,0,0,0.04)', borderDash: [5, 5] },
                            ticks: { color: '#64748b', font: { family: 'Plus Jakarta Sans', size: 11 } },
                            beginAtZero: true
                        }
                    }
                }
            });
        }
