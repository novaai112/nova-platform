<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analysis Results</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma,
               Geneva, Verdana, sans-serif;
               background: linear-gradient(135deg, #434343 0%, #000000 100%); 
               min-height: 100vh; 
               margin: 0; 
               display: flex; 
               justify-content: center; 
               align-items: center; 
               padding: 40px 20px; 
               box-sizing: border-box; }

        .container{ background-color: #ffffff; 
                    padding: 30px 40px; 
                    border-radius: 12px;
                    width: 100%; 
                    max-width: 1000px; 
                    box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
                    animation: fadeIn 0.8s ease-out; 
                    text-align: center; }

        @keyframes fadeIn { from { opacity: 0; 
                                   transform: translateY(-20px); } to { opacity: 1; 
                                   transform: translateY(0); } }

        h2 { color: #000000; 
             margin-top: 0; 
             margin-bottom: 25px; 
             text-transform: uppercase;
             letter-spacing: 2px; 
             border-bottom: 2px solid #000; 
             padding-bottom: 15px; 
             font-size: 1.8em; }

        .metrics-grid { display: flex; 
                        flex-wrap: wrap; 
                        gap: 15px; 
                        justify-content: center; 
                        margin-bottom: 30px; }

        .metric-card { background-color: #fafafa; 
                       border-left: 5px solid #000000; 
                       border-radius: 6px; 
                       padding: 15px 20px; 
                       min-width: 160px; 
                       box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
                       text-align: left; 
                       transition: transform 0.3s ease, 
                       box-shadow 0.3s ease; }

        .metric-card:hover { transform: translateY(-3px); 
                             box-shadow: 0 8px 15px rgba(0,0,0,0.1); }

        .metric-title { font-size: 0.75em; 
                        color: #666666; 
                        text-transform: uppercase; 
                        letter-spacing: 1px; 
                        margin-bottom: 5px; 
                        font-weight: bold; }

        .metric-value { font-size: 1.4em; 
                        font-weight: 800; 
                        color: #000000; }

        .metric-unit { font-size: 0.6em; 
                       color: #888888; 
                       font-weight: normal; 
                       margin-left: 3px; }

        .image-container { margin: 0 auto 30px auto; 
                           border: 1px solid #e0e0e0; 
                           border-radius: 8px; 
                           padding: 10px; 
                           background-color: #f9f9f9; 
                           box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }

        .image-container img { max-width: 100%; 
                               height: auto; 
                               border-radius: 4px; 
                               display: block; 
                               margin: 0 auto; }

        .btn-action { display: inline-block; 
                      background-color: #000000; 
                      color: #ffffff; 
                      text-decoration: none; 
                      padding: 12px 35px; 
                      font-size: 1.1em; 
                      border-radius: 6px; 
                      font-weight: bold; 
                      text-transform: uppercase; 
                      letter-spacing: 2px; 
                      transition: all 0.3s ease; 
                      border: 2px solid #000000; }

        .btn-action:hover { background-color: #ffffff; 
                            color: #000000; 
                            transform: translateY(-2px); 
                            box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
                            
    </style>
</head>
<body>
    <div class="container">
        <h2>Simulation Complete</h2>
        <div class="metrics-grid">
            <div class="metric-card"><div class="metric-title">Max Eqv Stress</div><div class="metric-value">{{ eqv_stress }}<span class="metric-unit">MPa</span></div></div>
            <div class="metric-card"><div class="metric-title">Total Deformation</div><div class="metric-value">{{ total_def }}<span class="metric-unit">mm</span></div></div>
            <div class="metric-card"><div class="metric-title">Principal Sum (S1+S2+S3)</div><div class="metric-value">{{ s_sum }}<span class="metric-unit">MPa</span></div></div>
        </div>
        <div class="image-container">
            <img src="{{ url_for('static', filename=image_url) }}" alt="Ansys Stress Plot">
        </div>
        <div style="margin-top: 20px; display: flex; justify-content: center; gap: 20px;">
            <a href="{{ url_for('static', filename=report_url) }}" download class="btn-action" style="background-color: #336699; border-color: #336699; color: #ffffff;">Download Ansys Workbench Report</a>
            <a href="/" class="btn-action">Run Another Analysis</a>
        </div>
    </div>
</body>
</html>
